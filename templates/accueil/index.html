<!-- @template name="Accueil — site vitrine" description="Page d'accueil complète The Bridge Center : hero, méthode, formations, témoignages, forum et CTA." -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Bridge Center — Apprendre l'anglais en ligne</title>
<link rel="icon" href="../../assets/mark-navy.png" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./ds-base.js"></script>
<style>
  html { scroll-behavior: smooth; }
  body { background: var(--surface-page); }
  @keyframes bcFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes bcRise { from { opacity: 0; transform: translateY(24px) scale(0.98); } to { opacity: 1; transform: none; } }
  .bc-mobile-menu { animation: bcFade var(--dur-base) var(--ease-out); }
  @media (max-width: 1080px) {
    .bc-hero-grid { grid-template-columns: 1fr !important; gap: var(--space-12) !important; min-height: auto !important; }
    .bc-hero-visual { order: -1; min-height: 360px !important; }
    .bc-course-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .bc-blog-grid, .bc-testimonial-grid { grid-template-columns: 1fr 1fr !important; }
    .bc-feature-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .bc-about-grid, .bc-forum-grid { grid-template-columns: 1fr !important; gap: var(--space-10) !important; }
    .bc-footer-grid { grid-template-columns: 1fr 1fr !important; gap: var(--space-10) !important; }
  }
  @media (max-width: 880px) {
    .bc-desktop-nav { display: none !important; }
    .bc-mobile-toggle { display: inline-flex !important; }
    .bc-stats-grid { grid-template-columns: repeat(2, 1fr) !important; gap: var(--space-10) !important; }
    .bc-steps { grid-template-columns: repeat(2, 1fr) !important; gap: var(--space-10) !important; }
    .bc-steps-line { display: none !important; }
    .bc-blog-grid, .bc-testimonial-grid { grid-template-columns: 1fr !important; max-width: 460px; margin-inline: auto; }
    .bc-auth-aside { display: none !important; }
    [role="dialog"] > div { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 560px) {
    .bc-course-grid, .bc-feature-grid { grid-template-columns: 1fr !important; max-width: 420px; margin-inline: auto; }
    .bc-footer-grid { grid-template-columns: 1fr !important; }
    .bc-steps { grid-template-columns: 1fr !important; max-width: 360px; margin-inline: auto; }
  }
</style>
</head>
<body>
<div id="root"></div>
<!-- Section sources are shared with the website UI kit (same folder depth, so asset paths resolve identically). -->
<script type="text/babel" src="../../ui_kits/website/bridge-kit.jsx"></script>
<script type="text/babel" src="../../ui_kits/website/chrome.jsx"></script>
<script type="text/babel" src="../../ui_kits/website/accueil-sections.jsx"></script>
<script type="text/babel" src="../../ui_kits/website/accueil-sections2.jsx"></script>
<script type="text/babel" src="../../ui_kits/website/auth.jsx"></script>
<script type="text/babel" src="../../ui_kits/website/app.jsx"></script>
</body>
</html>
