<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>À propos — The Bridge Center</title>
<link rel="icon" href="../../assets/mark-navy.png" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>
  html { scroll-behavior: smooth; }
  body { background: var(--surface-page); }
  @keyframes bcFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes bcRise { from { opacity: 0; transform: translateY(24px) scale(0.98); } to { opacity: 1; transform: none; } }
  .bc-mobile-menu { animation: bcFade var(--dur-base) var(--ease-out); }

  @media (max-width: 1080px) {
    .bc-values-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .bc-team-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .bc-footer-grid { grid-template-columns: 1fr 1fr !important; gap: var(--space-10) !important; }
  }
  @media (max-width: 880px) {
    .bc-desktop-nav { display: none !important; }
    .bc-mobile-toggle { display: inline-flex !important; }
    .bc-auth-aside { display: none !important; }
    [role="dialog"] > div { grid-template-columns: 1fr !important; }
    .bc-about-grid, .bc-method-grid { grid-template-columns: 1fr !important; gap: var(--space-10) !important; }
    .bc-method-grid > div:first-child { position: static !important; }
    .bc-stats-grid { grid-template-columns: repeat(2, 1fr) !important; gap: var(--space-10) !important; }
  }
  @media (max-width: 560px) {
    .bc-values-grid, .bc-team-grid { grid-template-columns: 1fr !important; max-width: 420px; margin-inline: auto; }
    .bc-footer-grid { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="bridge-kit.jsx"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="accueil-sections.jsx"></script>
<script type="text/babel" src="accueil-sections2.jsx"></script>
<script type="text/babel" src="auth.jsx"></script>
<script type="text/babel" src="apropos.jsx"></script>
<script type="text/babel" src="apropos-app.jsx"></script>
</body>
</html>
