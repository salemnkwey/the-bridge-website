<style>

<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Select, Checkbox } = window.TheBridgeCenterDesignSystem_13a399;

    return (
      <div className="grid">
        <Input label="Adresse e-mail" type="email" icon="mail" placeholder="vous@exemple.com" />
        <Input label="Mot de passe" type="password" icon="lock" defaultValue="motdepasse" hint="Au moins 8 caractères." />

          <Checkbox label="Se souvenir de moi" defaultChecked />
          <Checkbox label="Je souhaite recevoir la newsletter mensuelle" />

      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  requestAnimationFrame(() => window.lucide && window.lucide.createIcons());
  setTimeout(() => window.lucide && window.lucide.createIcons(), 300);
