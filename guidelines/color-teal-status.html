<!doctype html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--surface-page);font-family:var(--font-body);color:var(--text-body)}
  .swrow{display:flex;gap:10px}
  .sw{flex:1;border-radius:var(--radius-md);height:104px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-shadow:var(--shadow-xs);border:1px solid color-mix(in srgb,var(--ink-900) 6%,transparent)}
  .sw b{font-size:12px;font-weight:700;line-height:1.2}
  .sw small{font-family:var(--font-mono);font-size:10px;opacity:.82;letter-spacing:.02em}
  .stack{display:flex;flex-direction:column;gap:14px}
</style></head><body><div class="swrow"><div class="sw" style="background:var(--teal-50);color:var(--ink-900)"><b>teal-50</b><small>#e7f5f1</small></div><div class="sw" style="background:var(--teal-500);color:var(--cream-50)"><b>teal-500</b><small>#1e9483</small></div><div class="sw" style="background:var(--teal-600);color:var(--cream-50)"><b>teal-600</b><small>#157869</small></div><div class="sw" style="background:var(--success);color:var(--cream-50)"><b>success</b><small>#2f8f5b</small></div><div class="sw" style="background:var(--warning);color:var(--cream-50)"><b>warning</b><small>#c2841c</small></div><div class="sw" style="background:var(--danger);color:var(--cream-50)"><b>danger</b><small>#c0432f</small></div></div></body></html>
