<!doctype html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--surface-page);font-family:var(--font-body);color:var(--text-body)}
  .swrow{display:flex;gap:10px}
  .sw{flex:1;border-radius:var(--radius-md);height:104px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-shadow:var(--shadow-xs);border:1px solid color-mix(in srgb,var(--ink-900) 6%,transparent)}
  .sw b{font-size:12px;font-weight:700;line-height:1.2}
  .sw small{font-family:var(--font-mono);font-size:10px;opacity:.82;letter-spacing:.02em}
  .stack{display:flex;flex-direction:column;gap:14px}
</style></head><body><div class="swrow"><div class="sw" style="background:var(--indigo-300);color:var(--ink-900)"><b>indigo-300</b><small>#8598c3</small></div><div class="sw" style="background:var(--indigo-500);color:var(--cream-50)"><b>indigo-500</b><small>#344e85</small></div><div class="sw" style="background:var(--indigo-700);color:var(--cream-50)"><b>indigo-700</b><small>#1b2e5b</small></div><div class="sw" style="background:var(--indigo-800);color:var(--cream-50)"><b>indigo-800</b><small>#142248</small></div><div class="sw" style="background:var(--indigo-900);color:var(--cream-50)"><b>indigo-900</b><small>#0e1a38</small></div><div class="sw" style="background:var(--indigo-950);color:var(--cream-50)"><b>indigo-950</b><small>#091128</small></div></div></body></html>
