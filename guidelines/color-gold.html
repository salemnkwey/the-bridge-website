<!doctype html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--surface-page);font-family:var(--font-body);color:var(--text-body)}
  .swrow{display:flex;gap:10px}
  .sw{flex:1;border-radius:var(--radius-md);height:104px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-shadow:var(--shadow-xs);border:1px solid color-mix(in srgb,var(--ink-900) 6%,transparent)}
  .sw b{font-size:12px;font-weight:700;line-height:1.2}
  .sw small{font-family:var(--font-mono);font-size:10px;opacity:.82;letter-spacing:.02em}
  .stack{display:flex;flex-direction:column;gap:14px}
</style></head><body><div class="swrow"><div class="sw" style="background:var(--gold-100);color:var(--ink-900)"><b>gold-100</b><small>#fbeccd</small></div><div class="sw" style="background:var(--gold-300);color:var(--ink-900)"><b>gold-300</b><small>#f4c96f</small></div><div class="sw" style="background:var(--gold-400);color:var(--ink-900)"><b>gold-400</b><small>#efb74c</small></div><div class="sw" style="background:var(--gold-500);color:var(--ink-900)"><b>gold-500</b><small>#e2a33a</small></div><div class="sw" style="background:var(--gold-600);color:var(--cream-50)"><b>gold-600</b><small>#c2841c</small></div><div class="sw" style="background:var(--gold-700);color:var(--cream-50)"><b>gold-700</b><small>#996614</small></div></div></body></html>
