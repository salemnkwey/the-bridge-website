<!doctype html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--surface-page);font-family:var(--font-body);color:var(--text-body)}
  .swrow{display:flex;gap:10px}
  .sw{flex:1;border-radius:var(--radius-md);height:104px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-shadow:var(--shadow-xs);border:1px solid color-mix(in srgb,var(--ink-900) 6%,transparent)}
  .sw b{font-size:12px;font-weight:700;line-height:1.2}
  .sw small{font-family:var(--font-mono);font-size:10px;opacity:.82;letter-spacing:.02em}
  .stack{display:flex;flex-direction:column;gap:14px}
</style></head><body><div class="stack">
  <div style="font-family:var(--font-display);font-weight:800;font-size:54px;line-height:1;letter-spacing:var(--tracking-tighter);color:var(--text-strong)">Be the bridge</div>
  <div style="font-family:var(--font-display);font-weight:700;font-size:30px;line-height:1.05;letter-spacing:var(--tracking-tight);color:var(--indigo-700)">Apprendre l'anglais, à votre rythme</div>
  <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted)">--font-display · 700 / 800 · letter-spacing −0.02em à −0.03em</div>
</div></body></html>
