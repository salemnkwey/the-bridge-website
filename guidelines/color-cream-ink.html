<!-- @dsCard group="Colors" viewport="700x170" name="Crème & encre" subtitle="Papier chaud + neutres encre (jamais de gris pur)" -->
<!doctype html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--surface-page);font-family:var(--font-body);color:var(--text-body)}
  .swrow{display:flex;gap:10px}
  .sw{flex:1;border-radius:var(--radius-md);height:104px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-shadow:var(--shadow-xs);border:1px solid color-mix(in srgb,var(--ink-900) 6%,transparent)}
  .sw b{font-size:12px;font-weight:700;line-height:1.2}
  .sw small{font-family:var(--font-mono);font-size:10px;opacity:.82;letter-spacing:.02em}
  .stack{display:flex;flex-direction:column;gap:14px}
</style></head><body><div class="swrow"><div class="sw" style="background:var(--cream-50);color:var(--ink-900)"><b>cream-50</b><small>#fcfaf4</small></div><div class="sw" style="background:var(--cream-100);color:var(--ink-900)"><b>cream-100</b><small>#f7f1e5</small></div><div class="sw" style="background:var(--cream-200);color:var(--ink-900)"><b>cream-200</b><small>#efe6d3</small></div><div class="sw" style="background:var(--ink-300);color:var(--ink-900)"><b>ink-300</b><small>#bdb6a6</small></div><div class="sw" style="background:var(--ink-500);color:var(--cream-50)"><b>ink-500</b><small>#6e685a</small></div><div class="sw" style="background:var(--ink-900);color:var(--cream-50)"><b>ink-900</b><small>#18160f</small></div></div></body></html>
